<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .cart-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    cursor: pointer;
    background: #ff9800;
    padding: 8px 14px;
    border-radius: 20px;
    font-weight: bold;
    z-index: 10;
}

        .cart-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .cart-box {
            background: white;
            width: 350px;
            padding: 20px;
            border-radius: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
    </style>
</head>
<body>

<div class="menu-header">
    <div class="logo">CampusBites 🍔</div>
    <div class="user">Welcome, {{ name }}</div>
</div>
<div class="menu-wrapper">
    <div class="cart-btn" onclick="openCart()">🛒 Cart (<span id="cartCount">0</span>)</div>
    <div class="menu-grid">
    {% for item, price in menu.items() %}
    <div class="food-card">
        <img src="{{ url_for('static', filename='images/' + item|lower|replace(' ', '_') + '.jpg') }}">
        <div class="food-body">
            <h4>{{ item }}</h4>
            <div class="food-price">₹{{ price }}</div>

            <input type="number" min="1" value="1" id="qty_{{ loop.index }}" style="width:60px">

            <button onclick="addToCart('{{ item }}', {{ price }}, 'qty_{{ loop.index }}')">
                Add to Cart
            </button>
        </div>
    </div>
    {% endfor %}
</div>
</div>

<!-- CART POPUP -->
<div class="cart-modal" id="cartModal">
    <div class="cart-box">
        <h3>🛒 Your Cart</h3>
        <form action="/order" method="post">
            <input type="hidden" name="name" value="{{ name }}">
            <div id="cartItems"></div>
            <hr>
            <h3>Total: ₹<span id="totalAmount">0</span></h3>

<br>
<button type="submit">Place Order</button>

            <button type="button" onclick="closeCart()">Close</button>
        </form>
    </div>
</div>

<script>
let cart = [];

function addToCart(item, price, qtyId) {
    let qty = document.getElementById(qtyId).value;

    cart.push({item, price, qty});
    document.getElementById("cartCount").innerText = cart.length;
    alert(item + " added to cart!");
}

function openCart() {
    let cartBox = document.getElementById("cartItems");
    let totalBox = document.getElementById("totalAmount");

    cartBox.innerHTML = "";
    let total = 0;

    cart.forEach((c) => {
        let itemTotal = c.price * c.qty;
        total += itemTotal;

        cartBox.innerHTML += `
            <div class="cart-item">
                ${c.item} x ${c.qty} = ₹${itemTotal}
                <input type="hidden" name="item[]" value="${c.item}">
                <input type="hidden" name="quantity[]" value="${c.qty}">
            </div>`;
    });

    totalBox.innerText = total;
    document.getElementById("cartModal").style.display = "flex";
}


function closeCart() {
    document.getElementById("cartModal").style.display = "none";
}
</script>

</body>
</html>
